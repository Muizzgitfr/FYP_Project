services:
  - type: web
    name: ai-based-lms-engine
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        sync: false # Provide your Supabase URL in the Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
